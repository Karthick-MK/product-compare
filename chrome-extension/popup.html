<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      color: #dae2fd;
      background: #0b1326;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #adc6ff;
    }
    #count {
      font-size: 13px;
      color: #c2c6d6;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    #open-btn {
      background: #adc6ff;
      color: #0b1326;
    }
    #open-btn:disabled {
      background: #424754;
      cursor: default;
    }
    #clear-btn {
      background: transparent;
      border: 1px solid #424754;
      color: #c2c6d6;
      transition: border-color 0.15s, color 0.15s;
    }
    #clear-btn:hover {
      border-color: #ffb2b7;
      color: #ffb2b7;
    }
  </style>
</head>
<body>
  <h2>CompareXT</h2>
  <div id="count">Loading…</div>
  <button id="open-btn" disabled>Open Compare</button>
  <button id="clear-btn">Clear All</button>
  <script src="db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
