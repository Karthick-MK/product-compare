<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CompareXT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="compare.css"/>
</head>
<body>
  <header>
    <h1>CompareXT</h1>
    <span id="product-count"></span>
    <span id="enrich-badge">Loading details…</span>
    <label class="diff-toggle-label">
      <input type="checkbox" id="diff-toggle">
      Show differences only
    </label>
    <button id="clear-all-btn">Clear All</button>
  </header>
  <div id="compare-wrapper">
    <h2 id="page-title">Compare your product here</h2>
    <div id="compare-table"></div>
    <footer id="page-footer">
      <div class="footer-left">
        <span class="footer-brand">CompareXT</span>
        <span class="footer-copy">© 2026 CompareXT. All rights reserved.</span>
      </div>
      <nav class="footer-links">
        <a href="#">Contact Support</a>
      </nav>
    </footer>
  </div>
  <div id="empty-state" style="display:none">
    <span>No products to compare.</span>
    <span>Visit an Amazon product page and click "Add to Compare".</span>
  </div>
  <script src="db.js"></script>
  <script src="sites/amazon.js"></script>
  <script src="sites/flipkart.js"></script>
  <script src="sites/ajio.js"></script>
  <script src="sites/meesho.js"></script>
  <script src="sites/myntra.js"></script>
  <script src="sites/nykaa.js"></script>
  <script src="sites.js"></script>
  <script src="compare.js"></script>
</body>
</html>
